<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>FitTrack Login</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/auth.css"
    >

</head>

<body>

    <div class="background"></div>


    <div class="auth-container glass-card">

        <div class="logo">
            FITTRACK
        </div>


        <h1>
            Welcome Back
        </h1>

        <p>
            Track your fitness journey,
            monitor your health,
            and achieve your goals.
        </p>


        <div class="glow-line"></div>


        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button class="btn">
                Login
            </button>

        </form>


        <div class="auth-footer">

            Don't have an account?

            <a href="signup.html">
                Signup
            </a>

        </div>

    </div>


    <script src="js/auth.js"></script>

</body>
</html>
