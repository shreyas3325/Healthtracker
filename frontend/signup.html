<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>FitTrack Signup</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/auth.css"
    >

</head>

<body>

    <div class="background"></div>


    <div class="auth-container glass-card">

        <div class="logo">
            FITTRACK
        </div>


        <h1>
            Create Account
        </h1>

        <p>
            Start tracking your workouts,
            health progress,
            and fitness goals.
        </p>


        <div class="glow-line"></div>


        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Create Password"
            >

            <button class="btn">
                Signup
            </button>

        </form>


        <div class="auth-footer">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>


    <script src="js/auth.js"></script>

</body>
</html>
