<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>FitTrack Profile</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/dashboard.css"
    >

</head>

<body>

    <div class="background"></div>



    <!-- SIDEBAR -->

    <div class="sidebar glass-card">

        <div>

            <div class="sidebar-logo">
                FITTRACK
            </div>


            <div class="sidebar-links">

                <a href="dashboard.html">
                    Dashboard
                </a>

                <a href="healthlogs.html">
                    Health Logs
                </a>

                <a href="workouts.html">
                    Workouts
                </a>

                <a href="analytics.html">
                    Analytics
                </a>

                <a href="profile.html">
                    Profile
                </a>

            </div>

        </div>


        <button
            class="logout-btn"
            id="logoutBtn"
        >
            Logout
        </button>

    </div>





    <!-- MAIN CONTENT -->

    <div class="main-content">


        <!-- TOPBAR -->

        <div class="topbar">

            <h1>
                User Profile 👤
            </h1>

            <p>
                Manage your profile
                and fitness goals.
            </p>

        </div>




        <!-- PROFILE CARD -->

        <div class="health-form glass-card">


            <div class="profile-header">

                <div class="profile-avatar">

                    S

                </div>


                <div>

                    <h2 id="profileName">
                        User Name
                    </h2>

                    <p id="profileEmail">
                        user@email.com
                    </p>

                </div>

            </div>

        </div>





        <!-- GOALS FORM -->

        <div class="health-form glass-card">

            <h2>
                Fitness Goals
            </h2>


            <form id="goalsForm">

                <div class="form-grid">

                    <input
                        type="number"
                        id="dailyCaloriesGoal"
                        placeholder="Daily Calories Goal"
                    >

                    <input
                        type="number"
                        id="waterGoal"
                        placeholder="Water Goal (L)"
                    >

                    <input
                        type="number"
                        id="workoutGoal"
                        placeholder="Weekly Workout Goal"
                    >

                    <input
                        type="number"
                        id="targetWeight"
                        placeholder="Target Weight (kg)"
                    >

                </div>


                <button class="btn">
                    Save Goals
                </button>

            </form>

        </div>

    </div>


    <script src="js/profile.js"></script>

</body>
</html>
